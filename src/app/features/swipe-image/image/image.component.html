@let d = data();
@let c = config();
@let w = width();
@let h = height();
@let class = classes();
@if (d && c) {
    <div #wrapper class="wrapper" [style.width.px]="w" [style.height.px]="h">
        <div #container class="page-container" [ngClass]="class" [style.width.px]="w - 1" [style.height.px]="h - 1">
            <img class="image" [src]="d.data.img" />
        </div>
    </div>
}

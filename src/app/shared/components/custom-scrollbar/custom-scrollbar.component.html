@let p = params();
@let w = width();
@let h = height();
<x-substrate #substrate mode="rounded-rectangle" class="shape" [style.width.px]="w" [style.height.px]="h" [type]="type()" [width]="w" [height]="h"
    [roundCorner]="p.roundCorner" [strokeWidth]="8" [rippleColor]="p.rippleColor"
    [fillPositions]="fillPositions()" [fillColors]="fillColors()" [strokeColors]="p.strokeGradientColor"
    [strokeAnimationDuration]="p.strokeAnimationDuration"></x-substrate>
